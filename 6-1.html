<!doctype html>
<html>

<head>
    <title>Tantangan Parsons</title>
    <link href="./parsons.css" rel="stylesheet" />
    <link href="./lib/prettify.css" rel="stylesheet" />
    <script src="./lib/prettify.js"></script>
</head>

<body>
    <h2>Modul 6-1</h2>
    <p>Ini adalah fungsi yang memeriksa apakah elemen-elemen dalam sebuah larik tersortir berdasarkan kriteria.
    </p>
    <p>Penting untuk memperhatikan indentasi.</p>
    <p><a href=".">Balik ke laman utama</a></p>

    <div id="sortableTrash" class="sortable-code"></div>
    <div id="sortable" class="sortable-code">
    </div>
    <div style="clear:both;"></div>
    <p>
        <button class='restart' href="#" id="newInstanceLink">Ulangi lagi</button>
        <button class='submit' href="#" id="feedbackLink">Periksa jawabannya</button>
    </p>
    <script src="./lib/jquery.min.js"></script>
    <script src="./lib/jquery-ui.min.js"></script>
    <script src="./lib/jquery.ui.touch-punch.min.js"></script>
    <script src="./lib/underscore-min.js"></script>
    <script src="./lib/lis.js"></script>
    <script src="./parsons.js"></script>
    <script>
        var initial = 'function defaultComparator (a, b) {\n' +
            '  return a - b\n' +
            '}\n' +
            '\n' +
            'module.exports = function checksort (array, comparator) {\n' +
            '  if (!Array.isArray(array)) {\n' +
            '    throw new TypeError(\'Expected Array, got \' + (typeof array))\n' +
            '  }\n' +
            '  comparator = comparator || defaultComparator\n' +
            '  for (var i = 1, length = array.length; i < length; ++i) {\n' +
            '    if (comparator(array[i - 1], array[i]) > 0) return false\n' +
            '  }\n' +
            '  return true\n' +
            '}\n';

        function displayErrors(fb) {
            if (fb.errors.length > 0) {
                alert(fb.errors[0]);
            }
        }

        $(document).ready(function () {
            var parson = new ParsonsWidget({
                'sortableId': 'sortable',
                'trashId': 'sortableTrash',
                'max_wrong_lines': 2,
                'feedback_cb': displayErrors
            });
            parson.init(initial);
            parson.shuffleLines();
            $("#newInstanceLink").click(function (event) {
                event.preventDefault();
                parson.shuffleLines();
            });
            $("#feedbackLink").click(function (event) {
                event.preventDefault();
                parson.getFeedback();
            });
        });        
    </script>
    <!-- https://www.npmjs.com/package/is-sorted -->
</body>

</html>
