<!doctype html>
<html>

<head>
    <title>Tantangan Parsons</title>
    <link href="../../parsons.css" rel="stylesheet" />
    <link href="../../lib/prettify.css" rel="stylesheet" />
    <script src="../../lib/prettify.js"></script>
    <link rel="stylesheet" href="https://unpkg.com/chota@latest">
    <link rel="stylesheet" href="../../lib/index.css">
</head>

<body>
    <div class="container">
        <h2>Modul 6 #1</h2>
        <p>Susunlah agar menghasilkan program yang berjalan benar.</p>
        <p>Ini adalah program yang mengubah bilangan menurut basis yang diinginkan (biner atua desimal). Petunjuk:
            Dahulukan klausa pendek.</p>
        <p><a href="https://kodekruwet.github.io/tantangan-parsons/">Balik ke laman utama</a></p>

        <div id="sortableTrash" class="sortable-code"></div>
        <div id="sortable" class="sortable-code"></div>
        <div style="clear:both;"></div>
        <p>
            <button class='restart' href="#" id="newInstanceLink">Ulangi lagi</button>
            <button class='submit' href="#" id="feedbackLink">Periksa jawabannya</button>
        </p>
        <script src="../../lib/jquery.min.js"></script>
        <script src="../../lib/jquery-ui.min.js"></script>
        <script src="./../lib/jquery.ui.touch-punch.min.js"></script>
        <script src="../../lib/underscore-min.js"></script>
        <script src="../../lib/lis.js"></script>
        <script src="../../parsons.js"></script>
        <script>
            var initial = 'const convert = (number=undefined, base=undefined) => {\n' +
                '  if (base === undefined) throw new Error(\'Please introduce the base\');\n' +
                '  if (number === undefined) throw new Error(\'Please introduce the number\');\n' +
                '  if (typeof number !== \'number\' || typeof base !== \'number\') {\n' +
                '    throw new Error(\'Both parameters need to be number type\');\n' +
                '  }\n' +
                '  switch (base) {\n' +
                '    case 2:\n' +
                '      return parseInt(number, 2);\n' +
                '    case 10:\n' +
                '      return number.toString(2);\n' +
                '    default:\n' +
                '      throw new Error(\'Base must be 2 or 10\');\n' +
                '  }\n' +
                '};\n';
            function displayErrors(fb) {
                if (fb.errors.length > 0) {
                    alert(fb.errors[0]);
                }
            }
            $(document).ready(function () {
                var parson = new ParsonsWidget({
                    'sortableId': 'sortable',
                    'trashId': 'sortableTrash',
                    'max_wrong_lines': 2,
                    'feedback_cb': displayErrors
                });
                parson.init(initial);
                parson.shuffleLines();
                $("#newInstanceLink").click(function (event) {
                    event.preventDefault();
                    parson.shuffleLines();
                });
                $("#feedbackLink").click(function (event) {
                    event.preventDefault();
                    parson.getFeedback();
                });
            });
        </script>
    </div>
    <!-- https://www.npmjs.com/package/minimalistic-assert -->
</body>

</html>
